<section class="clearfix contactSection padding">
  <div class="container">
    <div class="row">
      <div class="col-md-6 col-lg-7 col-xl-8">
        <div class="contactTitle">
          <h3>Get in touch</h3>
        </div>

        <div class="contactForm">
          <form action="{{ site.contact_form_action }}" method="POST">
            <div class="form-group">
              <input type="text" name="name" class="form-control" placeholder="Your Name" required />
            </div>
            <div class="form-group">
              <input type="email" name="email" class="form-control" placeholder="Your Email" required />
            </div>
            <div class="form-group">
              <input type="text" name="phone" class="form-control" placeholder="Your Phone" required />
            </div>
            <div class="form-group">
              <textarea class="form-control" name="message" placeholder="Your Message" required></textarea>
            </div>
            <div class="form-group">
              <button type="submit" class="btn btn-primary first-btn">Send Message</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="holdingInfo lhf-surface-card">
          <p>Contact us for discounted student services, electrology training, or referrals to trained electrologists.</p>
          <ul>
            <li><span class="lhf-inline-icon" aria-hidden="true">@</span> <a href="mailto:{{ site.email }}">{{ site.email }}</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
